<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Key Cryptographic Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 md:p-8">
    <div class="flex items-center gap-3 border-b border-slate-800 pb-4 mb-6">
      <div class="p-2 bg-indigo-500/10 rounded-lg border border-indigo-500/20 text-indigo-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-white">License Key Builder</h1>
        <p class="text-xs text-slate-400 mt-0.5">Admin Offline Licensing Console</p>
      </div>
    </div>

    <form id="keyForm" class="space-y-4">
      <!-- Email Field -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-1.5">User Email</label>
        <input type="email" id="email" required placeholder="customer@email.com" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors">
      </div>

      <!-- GSTIN Field -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-1.5">User GSTIN</label>
        <input type="text" id="gstin" required placeholder="e.g. 27AAAAA1111A1Z1" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-sm uppercase text-slate-200 outline-none focus:border-indigo-500 transition-colors">
      </div>

      <!-- Mobile Number Field -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-1.5">Mobile Number</label>
        <input type="text" id="mobile" required placeholder="e.g. 9876543210" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-2 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors">
      </div>

      <!-- Plan and Expiry Combo -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-1.5">Plan Duration</label>
          <select id="plan" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors">
            <option value="1M">1 Month (1M)</option>
            <option value="6M">6 Months (6M)</option>
            <option value="1Y" selected>1 Year (1Y)</option>
            <option value="2Y">2 Years (2Y)</option>
            <option value="3Y">3 Years (3Y)</option>
            <option value="5Y">5 Years (5Y)</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-1.5">Expiration Date</label>
          <input type="date" id="expiry" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors font-medium">
        </div>
      </div>

      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-2.5 rounded-lg transition-colors mt-6 shadow-lg shadow-indigo-600/10">
        Generate Cryptographic License Key
      </button>
    </form>

    <!-- Success Result Drawer -->
    <div id="resultBox" class="hidden mt-6 pt-6 border-t border-slate-800/80 space-y-3">
      <div class="flex items-center justify-between">
        <label class="text-xs font-semibold uppercase tracking-wider text-emerald-400">Secure Key Compiled Successfully</label>
        <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] px-2 py-0.5 rounded font-bold">READY</span>
      </div>
      
      <div class="relative bg-slate-950 border border-slate-800 rounded-lg p-3.5 flex items-center justify-between">
        <p id="generatedKey" class="mono text-emerald-400 text-xs font-bold whitespace-normal break-all select-all pr-8"></p>
        <button id="copyBtn" class="absolute right-3 top-3 hover:text-white text-slate-400 cursor-pointer transition-colors" title="Copy key">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
          </svg>
        </button>
      </div>

      <p class="text-[10px] text-slate-500 text-center select-none">
        This key strictly matches the offline secure signature validation system (SHA-256 with Business Salt matching Email + GSTIN + Mobile).
      </p>
    </div>
  </div>

  <script>
    // Automatic Date Adjuster
    const planSelect = document.getElementById('plan');
    const expiryDate = document.getElementById('expiry');

    function updateDefaultExpiry() {
      const duration = planSelect.value;
      const d = new Date();
      if (duration === "1M") d.setMonth(d.getMonth() + 1);
      else if (duration === "6M") d.setMonth(d.getMonth() + 6);
      else if (duration === "1Y") d.setFullYear(d.getFullYear() + 1);
      else if (duration === "2Y") d.setFullYear(d.getFullYear() + 2);
      else if (duration === "3Y") d.setFullYear(d.getFullYear() + 3);
      else if (duration === "5Y") d.setFullYear(d.getFullYear() + 5);

      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      expiryDate.value = `${y}-${m}-${day}`;
    }

    planSelect.addEventListener('change', updateDefaultExpiry);
    updateDefaultExpiry(); // Initial call

    // Cryptographic calculation matching the App
    async function calculateSHA256(text) {
      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    document.getElementById('keyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const gstin = document.getElementById('gstin').value.trim().toUpperCase();
      const mobile = document.getElementById('mobile').value.trim();
      const plan = planSelect.value;
      const expiryVal = expiryDate.value.replace(/-/g, ''); // Converts YYYY-MM-DD to YYYYMMDD
      
      const salt = "Abdurrahman_Billing_System_2026_Salt";
      const dataString = `${email}_${gstin}_${mobile}_${plan}_${expiryVal}_${salt}`;
      
      const hash = await calculateSHA256(dataString);
      const signature = hash.substring(0, 32);
      
      const key = `BM-${plan}-${expiryVal}-${signature}`;
      
      document.getElementById('generatedKey').innerText = key;
      document.getElementById('resultBox').classList.remove('hidden');
    });

    // Simple Copy notification
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.addEventListener('click', () => {
      const text = document.getElementById('generatedKey').innerText;
      navigator.clipboard.writeText(text).then(() => {
        // Simple visual feedback
        copyBtn.classList.add('text-emerald-400');
        setTimeout(() => {
          copyBtn.classList.remove('text-emerald-400');
        }, 1500);
      });
    });
  </script>
</body>
</html>
